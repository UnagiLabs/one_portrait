name: move-ci

on:
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  move-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: bash
        working-directory: contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Sui CLI
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/xdg-config"
          echo "XDG_CONFIG_HOME=$RUNNER_TEMP/xdg-config" >> "$GITHUB_ENV"
          curl -sSfL https://raw.githubusercontent.com/MystenLabs/suiup/main/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          suiup install -y sui@testnet
          suiup default set sui@testnet
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Show Sui version
        run: sui --version

      - name: Build Move package
        run: sui move build

      - name: Run Move tests
        run: sui move test
