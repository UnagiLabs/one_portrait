name: frontend-ci

on:
  pull_request:
    paths:
      - "apps/**"
      - "shared/**"
      - "generator/**"
      - "docs/tech.md"
      - "test/**"
      - "README.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "tsconfig.base.json"
      - "biome.json"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUI_NETWORK: "testnet"
      NEXT_PUBLIC_PACKAGE_ID: "0x3c1a92273f2ad9369f9fa18167b06f6023b2982340c768886c5f85ba4ab8f7a3"
      NEXT_PUBLIC_REGISTRY_OBJECT_ID: "0x08ba74331f2e7574956c9fdfe3472cdc269513325258452f962e0a36a5d6bcb6"
      NEXT_PUBLIC_ENOKI_API_KEY: "enoki_public_f6adc0082f791a0a226ac20f81a9f635"
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: "317939856639-5m1cu2msauk1s66q6u6jj35ja0ir1mar.apps.googleusercontent.com"
      NEXT_PUBLIC_WALRUS_PUBLISHER: "https://publisher.walrus-testnet.walrus.space"
      NEXT_PUBLIC_WALRUS_AGGREGATOR: "https://aggregator.walrus-testnet.walrus.space"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Biome check
        run: corepack pnpm run lint

      - name: Type check
        run: corepack pnpm run typecheck

      - name: Unit test
        run: corepack pnpm test

      - name: Web build
        run: corepack pnpm --filter web run build

      - name: Prepare env for bundle size test
        run: cp apps/web/.env.example apps/web/.env

      - name: Cloudflare dry-run and bundle size
        run: corepack pnpm --filter web run test:bundle-size
