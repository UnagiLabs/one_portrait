name: frontend-ci

on:
  pull_request:
    paths:
      - "apps/**"
      - "shared/**"
      - "generator/**"
      - "ops/**"
      - "scripts/deployment-env.mjs"
      - "docs/tech.md"
      - "test/**"
      - "README.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "tsconfig.base.json"
      - "biome.json"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check deployment manifest drift
        run: corepack pnpm run check:deployment

      - name: Biome check
        run: corepack pnpm run lint

      - name: Type check
        run: corepack pnpm run typecheck

      - name: Unit test
        run: corepack pnpm test

      - name: Web build
        run: corepack pnpm --filter web run build

      - name: Prepare env for bundle size test
        run: corepack pnpm --filter web exec node ../../scripts/deployment-env.mjs web-public > apps/web/.env

      - name: Cloudflare dry-run and bundle size
        run: corepack pnpm --filter web run test:bundle-size
